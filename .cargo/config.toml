[alias]
# run with "cargo +nightly fuzz-..."
fuzz-all = "fuzz run parse_str -- -dict=fuzz/dict/gedcom.dict -max_len=65536"
fuzz-parse-str = "fuzz run parse_str -- -dict=fuzz/dict/gedcom.dict -max_len=65536"
fuzz-parse-bytes = "fuzz run parse_bytes -- -dict=fuzz/dict/gedcom.dict -max_len=65536"
fuzz-stream = "fuzz run stream_parser -- -dict=fuzz/dict/gedcom.dict -max_len=65536"
fuzz-encoding = "fuzz run detect_encoding -- -max_len=65536"
fuzz-version = "fuzz run detect_version -- -max_len=65536"
fuzz-escape = "fuzz run escape_at_roundtrip -- -max_len=65536"
fuzz-name = "fuzz run name_parse -- -max_len=65536"
fuzz-date = "fuzz run date_qualifier -- -max_len=65536"
fuzz-writer = "fuzz run writer_roundtrip -- -dict=fuzz/dict/gedcom.dict -max_len=65536"
fuzz-encode = "fuzz run encode_decode_roundtrip -- -max_len=65536"
fuzz-gedzip = "fuzz run gedzip_read -- -max_len=65536"
